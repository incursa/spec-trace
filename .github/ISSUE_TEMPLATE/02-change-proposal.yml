name: Change proposal
description: Propose a change to the standard, templates, schemas, or examples.
title: "[Change proposal]: "
body:
  - type: markdown
    attributes:
      value: Use this for proposed standard changes. Keep the proposal focused and explain any compatibility impact.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What change are you proposing?
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why this change
      description: Why is the change needed?
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Affected artifacts
      description: Which docs, templates, schemas, or examples are affected?
      placeholder: overview.md, layout.md, spec_template.md, schemas/trace-links.schema.json
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Is this a breaking change to canonical field names or artifact structure?
    validations:
      required: true
