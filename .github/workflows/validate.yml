name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve pinned CUE CLI
        id: cue
        shell: pwsh
        run: |
          $cue = ./scripts/Resolve-Cue.ps1
          "path=$cue" >> $env:GITHUB_OUTPUT
          Add-Content -LiteralPath $env:GITHUB_PATH -Value (Split-Path -Parent $cue)

      - name: Sync publish submodule
        shell: pwsh
        run: ./scripts/Sync-PublishModule.ps1

      - name: Run tool tests
        shell: pwsh
        run: dotnet test tests/SpecTrace.Tool.Tests/SpecTrace.Tool.Tests.csproj

      - name: Validate canonical CUE artifacts
        shell: pwsh
        run: ./scripts/Test-SpecTraceRepository.ps1 -Profile core

      - name: Check generated Markdown
        shell: pwsh
        run: ./scripts/Render-SpecTraceMarkdown.ps1 -Check

      - name: Verify publish submodule is synchronized
        shell: pwsh
        run: |
          $status = git status --short --untracked-files=all -- publish
          if ($status) {
            $status | Write-Host
            throw "Publish subtree is not synchronized."
          }

      - name: Verify publish module metadata is tidy
        shell: pwsh
        run: |
          Push-Location publish
          try {
            cue mod tidy
          }
          finally {
            Pop-Location
          }
          $status = git status --short --untracked-files=all -- publish
          if ($status) {
            $status | Write-Host
            throw "Publish subtree changed after cue mod tidy."
          }

      - name: Evaluate publish module templates package
        shell: pwsh
        run: |
          Push-Location publish
          try {
            cue eval .:templates
          }
          finally {
            Pop-Location
          }

      - name: Dry-run publish module
        shell: pwsh
        run: |
          Push-Location publish
          try {
            cue mod publish v0.0.0-validate --dry-run
          }
          finally {
            Pop-Location
          }

      - name: Build repository catalog
        shell: pwsh
        run: ./scripts/Build-SpecTraceCatalog.ps1

      - name: Validate evidence snapshots
        shell: pwsh
        run: ./scripts/Validate-SpecTraceEvidence.ps1

      - name: Render attestation report
        shell: pwsh
        run: ./scripts/Render-SpecTraceAttestation.ps1 -Profile core -Emit both
