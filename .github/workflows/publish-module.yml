name: Publish JSON Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Package version label, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          }
          else {
            $version = '${{ github.ref_name }}'
          }

          if ($version -notmatch '^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
            throw "Package version '$version' is not a valid semver tag."
          }

          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Sync publish mirror
        shell: pwsh
        run: ./scripts/Sync-PublishModule.ps1

      - name: Run tool tests
        shell: pwsh
        run: dotnet test tests/SpecTrace.Tool.Tests/SpecTrace.Tool.Tests.csproj

      - name: Validate canonical JSON artifacts
        shell: pwsh
        run: ./scripts/Test-SpecTraceRepository.ps1 -Profile core

      - name: Build repository catalog
        shell: pwsh
        run: ./scripts/Build-SpecTraceCatalog.ps1

      - name: Validate evidence snapshots
        shell: pwsh
        run: ./scripts/Validate-SpecTraceEvidence.ps1

      - name: Render attestation report
        shell: pwsh
        run: ./scripts/Render-SpecTraceAttestation.ps1 -Profile core -Emit both

      - name: Verify publish mirror is synchronized
        shell: pwsh
        run: |
          $status = git status --short --untracked-files=all -- publish
          if ($status) {
            $status | Write-Host
            throw "Publish mirror is not synchronized."
          }

      - name: Create publish archive
        id: archive
        shell: pwsh
        run: |
          $artifactDirectory = Join-Path $PWD 'artifacts'
          New-Item -ItemType Directory -Force -Path $artifactDirectory | Out-Null
          $archivePath = Join-Path $artifactDirectory "spec-trace-publish-${{ steps.version.outputs.value }}.zip"
          if (Test-Path -LiteralPath $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }
          Compress-Archive -Path 'publish\*' -DestinationPath $archivePath
          "path=$archivePath" >> $env:GITHUB_OUTPUT

      - name: Upload publish archive
        uses: actions/upload-artifact@v4
        with:
          name: spec-trace-publish-${{ steps.version.outputs.value }}
          path: ${{ steps.archive.outputs.path }}
