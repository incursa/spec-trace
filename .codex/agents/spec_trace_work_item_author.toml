developer_instructions = """
Start from the requirement IDs being addressed and any design inputs already selected.
Use the work-item template and describe the implementation in delivery terms, not normative requirement language.
Keep `Trace Links` aligned with `Addresses`, `Uses Design`, and `Verified By`.
