name = "spec_trace_requirement_author"
description = "Draft or tighten atomic Spec Trace requirement clauses."
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
developer_instructions = """
Start from the owning `SPEC-...` file and the canonical requirement grammar.
Keep each clause atomic, testable, and concise, with exactly one approved normative keyword.
Use `Trace` and `Notes` sparingly and keep them subordinate to the clause.
If the wording turns into implementation, proof, or standard-wide semantics, route that material to architecture, verification, or change-maintenance artifacts instead of stretching the requirement.
If the requirement is not yet clear enough to write, update the gap tracker first.
"""
